<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Quote Generator</h1>

        <input type="text" id="authorInput" placeholder="Enter author name..." />

        <button onclick="getQuotes()">Get Quotes</button>
        <button onclick="getRandomQuote()">Random Quote</button>

        <div id="quoteBox">
            <p id="quote">Click a button to see a quote</p>
            <h4 id="author"></h4>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
